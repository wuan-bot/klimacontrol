<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KlimaControl</title>
    <link rel="stylesheet" href="/common.css">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 id="pageTitle">klimacontrol</h1>
            <div class="device-id">
                <span id="deviceId">Loading...</span>
                <span id="firmwareVersion" class="firmware-version"></span>
                <span id="otaPartition" class="ota-partition"></span>
            </div>
        </div>

        <div class="content">
            <div class="sensor-grid">
                <div class="sensor-card">
                    <div class="sensor-label">Temperature</div>
                    <div class="sensor-value"><span class="sensor-number" id="currentTemp">-</span><span class="sensor-unit">&deg;C</span></div>
                </div>
                <div class="sensor-card">
                    <div class="sensor-label">Rel. Humidity</div>
                    <div class="sensor-value"><span class="sensor-number" id="currentHumidity">-</span><span class="sensor-unit">%</span></div>
                </div>
                <div class="sensor-card">
                    <div class="sensor-label">Dew Point</div>
                    <div class="sensor-value"><span class="sensor-number" id="currentDewPoint">-</span><span class="sensor-unit">&deg;C</span></div>
                </div>
            </div>

            <div class="control-bar">
                <div class="control-item">
                    <div class="control-label-sm">Target</div>
                    <div class="control-value" id="targetTemp">-</div>
                </div>
                <div class="control-item">
                    <div class="control-label-sm">Control</div>
                    <div class="control-value" id="controlStatus">-</div>
                </div>
            </div>

            <div id="measurementOverview" class="measurement-section">
                <button class="btn btn-primary btn-sm" onclick="showMeasurements()">Show Measurements</button>
                <button class="btn btn-danger btn-sm" id="clearMeasurementsBtn" onclick="clearMeasurements()" style="display: none; margin-left: 8px;">Clear</button>
                <table id="measurementTable" class="measurement-table" style="display: none;">
                    <thead>
                        <tr>
                            <th>Measurement</th>
                            <th>Value</th>
                            <th>Unit</th>
                            <th>Sensor</th>
                        </tr>
                    </thead>
                    <tbody id="measurementTableBody">
                    </tbody>
                </table>
            </div>
        </div>

        <div class="nav-footer">
            <a href="/settings" class="about-link">Settings</a>
            <a href="/about" class="about-link">Device Info</a>
        </div>
    </div>

    <script>
        let currentStatus = {};
        let lastSuccessfulFetch = Date.now();
        let measurementsVisible = false;

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Update device info display
        function updateDeviceInfo() {
            const pageTitleElement = document.getElementById('pageTitle');
            const deviceIdElement = document.getElementById('deviceId');

            if (currentStatus.device_id) {
                const hostname = "klima-" + currentStatus.device_id.toLowerCase();
                const hasCustomName = currentStatus.device_name && currentStatus.device_name !== currentStatus.device_id;

                // Update page title with custom name if set
                if (hasCustomName) {
                    pageTitleElement.textContent = 'KlimaControl ' + currentStatus.device_name;
                } else {
                    pageTitleElement.textContent = 'KlimaControl';
                }

                // Device ID and technical details
                let infoHTML = esc(currentStatus.device_id);

                if (currentStatus.wifi_connected && currentStatus.wifi_ssid) {
                    infoHTML += `<br><small class="device-subtitle">
                        WiFi: ${esc(currentStatus.wifi_ssid)}<br>
                        Access at: <a href="http://${hostname}.local/">${hostname}.local</a>
                    </small>`;
                } else {
                    infoHTML += `<br><small class="device-subtitle">
                        Access at: <a href="http://${hostname}.local/">${hostname}.local</a>
                    </small>`;
                }

                deviceIdElement.innerHTML = infoHTML;
            }

            // Update firmware version
            const firmwareVersionElement = document.getElementById('firmwareVersion');
            if (firmwareVersionElement && currentStatus.firmware_version) {
                firmwareVersionElement.textContent = currentStatus.firmware_version;
            }

            // Update OTA partition
            const otaPartitionElement = document.getElementById('otaPartition');
            if (otaPartitionElement && currentStatus.ota_partition) {
                otaPartitionElement.textContent = `(${currentStatus.ota_partition})`;
            }
        }

        // Initialize
        async function init() {
            await updateStatus();
        }
        init();

        // Update status periodically
        setInterval(function() {
            updateStatus();
            if (measurementsVisible) refreshMeasurements();
        }, 10000);

        // Fetch and update device status
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                currentStatus = await response.json();
                
                // Update device info (device ID, firmware version, OTA partition)
                updateDeviceInfo();
                
                // Update temperature/humidity displays
                // Update temperature display
                const tempElement = document.getElementById('currentTemp');
                if (tempElement && currentStatus.temperature !== undefined) {
                    tempElement.textContent = currentStatus.temperature.toFixed(1);
                }

                // Update humidity display
                const humidityElement = document.getElementById('currentHumidity');
                if (humidityElement && currentStatus.relative_humidity !== undefined) {
                    humidityElement.textContent = currentStatus.relative_humidity.toFixed(1);
                }

                // Update dew point display from measurements array
                const dewPointElement = document.getElementById('currentDewPoint');
                if (dewPointElement && currentStatus.dew_point !== undefined) {
                    dewPointElement.textContent = currentStatus.dew_point.toFixed(1);
                }
                
                // Update target temperature display
                const targetTempElement = document.getElementById('targetTemp');
                if (targetTempElement && currentStatus.target_temperature !== undefined) {
                    targetTempElement.textContent = `${currentStatus.target_temperature.toFixed(1)}°C`;
                }
                
                // Update control status
                const controlStatusElement = document.getElementById('controlStatus');
                if (controlStatusElement) {
                    controlStatusElement.textContent = currentStatus.control_enabled ? 'Active' : 'Off';
                    controlStatusElement.style.color = currentStatus.control_enabled ? '#28a745' : '#dc3545';
                }

                // Mark data as fresh
                lastSuccessfulFetch = Date.now();
                document.querySelector('.sensor-grid').classList.remove('stale');
            } catch (error) {
                console.error('Failed to update status:', error);
                if (Date.now() - lastSuccessfulFetch > 30000) {
                    document.querySelector('.sensor-grid').classList.add('stale');
                }
            }
        }

        async function refreshMeasurements() {
            try {
                const response = await fetch('/api/measurements');
                const data = await response.json();
                const tbody = document.getElementById('measurementTableBody');
                const table = document.getElementById('measurementTable');
                const clearBtn = document.getElementById('clearMeasurementsBtn');
                if (!tbody || !table) return;
                if (!data.valid || !data.measurements || data.measurements.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" class="no-data">No data available</td></tr>';
                    table.style.display = 'table';
                    if (clearBtn) clearBtn.style.display = 'inline-block';
                    return;
                }
                tbody.innerHTML = data.measurements.map(m => {
                    const val = typeof m.value === 'number'
                        ? (Number.isInteger(m.value) ? m.value : m.value.toFixed(2))
                        : esc(String(m.value));
                    const calcNote = m.calculated ? ' <small class="calc-note">(calc)</small>' : '';
                    return `<tr>
                        <td>${esc(m.type)}${calcNote}</td>
                        <td>${val}</td>
                        <td>${esc(m.unit)}</td>
                        <td>${esc(m.sensor)}</td>
                    </tr>`;
                }).join('');
                table.style.display = 'table';
                if (clearBtn) clearBtn.style.display = 'inline-block';
            } catch (error) {
                console.error('Failed to fetch measurements:', error);
            }
        }

        async function showMeasurements() {
            measurementsVisible = true;
            await refreshMeasurements();
        }

        function clearMeasurements() {
            measurementsVisible = false;
            const table = document.getElementById('measurementTable');
            const tbody = document.getElementById('measurementTableBody');
            const clearBtn = document.getElementById('clearMeasurementsBtn');
            if (table) table.style.display = 'none';
            if (tbody) tbody.innerHTML = '';
            if (clearBtn) clearBtn.style.display = 'none';
        }
    </script>
</body>
</html>
